services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crash_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: skyhigh_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crash_user} -d skyhigh_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-crash_user}:${POSTGRES_PASSWORD}@postgres:5432/skyhigh_db?schema=public
      REDIS_URL: redis://redis:6379
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@skyhigh.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: deploy/Dockerfile.nginx
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${ADMIN_PORT:-8080}:8080"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
